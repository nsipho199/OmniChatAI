workflows:
  omniChatAI:
    name: OmniChat AI Build
    environment:
      vars:
        PACKAGE_NAME: "com.omnichat.ai"
    scripts:
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - "your-email@example.com"